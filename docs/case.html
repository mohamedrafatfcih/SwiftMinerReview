<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SwiftMiner Detection Review</title>
  <link rel="stylesheet" href="assets/review.css">
  <script src="site-config.js"></script>
  <script src="https://tally.so/widgets/embed.js"></script>
  <script defer src="assets/review.js"></script>
</head>
<body data-page="case">
  <header class="site-header">
    <a href="cases.html" id="back-link">← All detections</a>
    <div class="reviewer-chip">Reviewer <strong data-reviewer-id></strong></div>
  </header>
  <main class="case-shell">
    <p id="case-loading" role="status">Loading detection…</p>
    <section id="case-content" hidden>
      <div class="case-heading">
        <div>
          <p class="eyebrow" id="case-id"></p>
          <h1 id="case-type"></h1>
        </div>
        <button id="review-button" class="primary-button" type="button">Submit review</button>
      </div>
      <p id="review-status" class="review-status" role="status"></p>
      <dl class="metadata" id="case-metadata"></dl>
      <div class="comparison-grid">
        <section>
          <h2>Before</h2>
          <pre id="old-content"><code></code></pre>
        </section>
        <section>
          <h2>After</h2>
          <pre id="current-content"><code></code></pre>
        </section>
      </div>
      <details>
        <summary>Raw detector output</summary>
        <pre id="raw-json"><code></code></pre>
      </details>
      <details id="my-review" hidden>
        <summary>My latest locally saved answers</summary>
        <pre id="my-review-json"><code></code></pre>
      </details>
    </section>
    <p id="case-error" class="error" role="alert" hidden></p>
  </main>
</body>
</html>
