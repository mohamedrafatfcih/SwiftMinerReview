<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#4f46e5">
  <title>{{ page.title }} · SwiftMiner Expert Review</title>
  <link rel="icon" href="assets/favicon.svg?v=2" type="image/svg+xml">
  <link rel="stylesheet" href="assets/review.css?v=8">
  <script defer src="assets/review.js?v=17"></script>
</head>
<body data-page="docs">
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html" data-preserve-reviewer>
        <img class="brand-mark" src="assets/favicon.svg" alt="" width="36" height="36">
        <span><strong>SwiftMiner</strong><small>Expert Review</small></span>
      </a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="index.html" data-preserve-reviewer>Overview</a>
        <a href="cases.html" data-preserve-reviewer>Detections</a>
        <a href="instructions.html" data-preserve-reviewer{% if page.title == "Reviewer Instructions" %} aria-current="page"{% endif %}>Instructions</a>
      </nav>
      <div class="header-actions">
        <div class="reviewer-chip"><span>Reviewer</span><strong data-reviewer-id></strong></div>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch color theme"><span data-theme-icon aria-hidden="true">☾</span></button>
      </div>
    </div>
  </header>
  <main class="page-shell document-shell">
    <article class="document-card prose card">
      {{ content }}
    </article>
  </main>
  <footer class="site-footer">
    <div><strong>SwiftMiner Expert Review</strong><span>Independent validation of detected Swift refactorings.</span></div>
    <nav aria-label="Footer navigation"><a href="instructions.html">Instructions</a><a href="privacy.html">Privacy</a></nav>
  </footer>
</body>
</html>
